name: Scrape MFM

on:
  schedule:
    - cron: '0 16 * * *' # daily 16:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Snapshot current data
        run: |
          mkdir -p /tmp/old-data
          cp -r data/. /tmp/old-data/ 2>/dev/null || true

      - name: Scrape
        run: pnpm scrape

      - name: Generate changelog
        run: |
          {
            echo "Automated Munitorum Field Manual scrape."
            echo
            pnpm exec tsx src/diff.ts /tmp/old-data data
          } > /tmp/changelog.md
          cat /tmp/changelog.md

      - name: Open pull request on change
        uses: peter-evans/create-pull-request@v6
        with:
          branch: mfm/auto-update
          base: main
          title: 'MFM data update'
          body-path: /tmp/changelog.md
          commit-message: 'data: update MFM points values'
          labels: mfm-update
          delete-branch: true

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scrape failed (${new Date().toISOString().slice(0, 10)})`,
              labels: ['scrape-failure'],
              body: [
                'The scheduled MFM scrape failed — the source site markup may have drifted.',
                '',
                `Run log: ${run}`,
                '',
                'To fix, follow `.agents/playbooks/diagnose-parse.md`.',
              ].join('\n'),
            });
