name: Scrape MFM

on:
  schedule:
    - cron: '0 16 * * *' # daily 16:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Snapshot current data
        run: |
          mkdir -p /tmp/old-data
          cp -r data/. /tmp/old-data/ 2>/dev/null || true

      - name: Scrape
        run: pnpm scrape --report /tmp/failures.md

      - name: Generate changelog
        run: |
          {
            echo "# MFM data update — $(date -u +%Y-%m-%d)"
            echo
            echo "_Automated Munitorum Field Manual scrape. The YAML diff is canonical; this is the readable summary._"
            echo
            pnpm exec tsx src/diff.ts /tmp/old-data data
          } > /tmp/changelog.md
          cat /tmp/changelog.md

      - name: Update DATA-CHANGELOG.md
        run: pnpm exec tsx scripts/update-data-changelog.ts /tmp/old-data data "$(date -u +%Y-%m-%d)"

      - name: Open pull request on change
        uses: peter-evans/create-pull-request@v8
        with:
          branch: mfm/auto-update
          base: main
          title: 'MFM data update'
          body-path: /tmp/changelog.md
          commit-message: 'data: update MFM points values'
          labels: mfm-update
          delete-branch: true

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let details = '';
            try { details = fs.readFileSync('/tmp/failures.md', 'utf8').trim(); } catch {}
            const body = [
              'The scheduled MFM scrape failed — the source site markup may have drifted, or a faction stopped parsing.',
              '',
              `**Run log:** ${run}`,
              '',
              details || '_No per-faction detail was captured — the run likely failed before parsing (network, browser launch, or the index page itself). Check the run log._',
              '',
              '---',
              'To fix, follow `.agents/playbooks/diagnose-parse.md`. Each block above is the located parser error (including any unconsumed-content report from the completeness check).',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scrape failed (${new Date().toISOString().slice(0, 10)})`,
              labels: ['scrape-failure'],
              body,
            });
